<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIZJA University — Agent Due Diligence</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="logo">V</div>
    <div>
      <h1>VIZJA University</h1>
      <div class="sub" id="hdr-sub">Agent Due Diligence Form</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="lang-toggle" role="group" aria-label="Language">
    <button data-lang="en" class="active">EN</button>
    <button data-lang="pl">PL</button>
  </div>
</header>

<div class="progress"><div class="wrap"><div class="bar"><i id="progbar"></i></div></div></div>

<main class="wrap">
  <div id="invite-banner" class="section-note hidden"></div>
  <div class="card intro-card" id="intro"></div>
  <form id="ddform" autocomplete="off"></form>
  <div class="card no-print">
    <div class="btn-row">
      <button type="button" class="btn ghost" id="saveDraft" data-en="Save draft (this device)" data-pl="Zapisz wersję roboczą (to urządzenie)">Save draft (this device)</button>
      <button type="button" class="btn gold" id="printBtn" data-en="Print / Save as PDF" data-pl="Drukuj / Zapisz jako PDF">Print / Save as PDF</button>
      <div class="spacer"></div>
      <button type="button" class="btn" id="submitBtn" data-en="Submit to VIZJA University" data-pl="Wyślij do VIZJA University">Submit to VIZJA University</button>
    </div>
    <p class="muted" id="submit-note" style="margin:.6em 0 0;font-size:13px"></p>
  </div>
</main>

<div id="toast" class="toast"></div>

<script src="/js/schema.js"></script>
<script src="/js/form.js"></script>
</body>
</html>
