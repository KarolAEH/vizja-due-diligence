# Render Blueprint — VIZJA University Agent Due Diligence
# Plan Starter z dyskiem trwałym: zgłoszenia agencji przetrwają redeploye i restarty.
# Po połączeniu repozytorium z Render, panel "Blueprints" odczyta ten plik automatycznie.
services:
  - type: web
    name: vizja-due-diligence
    runtime: node
    plan: starter            # dysk trwały wymaga planu płatnego (nie działa na free)
    region: frankfurt        # najbliżej Polski; zmień w razie potrzeby
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /admin
    autoDeploy: true         # każdy push do gałęzi głównej = automatyczny deploy
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: SESSION_SECRET
        generateValue: true  # Render wygeneruje losowy sekret jeden raz i go zapamięta
      - key: ADMIN_PASSWORD
        sync: false          # ustawisz ręcznie w panelu Render (nie trafia do repo)
      - key: DB_PATH
        value: /var/data/vizja.db
    disk:
      name: vizja-data
      mountPath: /var/data
      sizeGB: 1
